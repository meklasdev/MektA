name: Mekta CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Validate Compiler
        run: node -e "import { compile } from './core/compiler.js'; compile('<page><text>CI Check</text></page>')"
      - name: Build Web Page
        run: node -e "import { compile } from './core/compiler.js'; import fs from 'fs'; const { js } = compile(fs.readFileSync('website/index.mek', 'utf8'), { target: 'html' }); fs.writeFileSync('website/index.html', js);"
      - name: Upload Website Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: website/
